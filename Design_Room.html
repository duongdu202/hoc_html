<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế mặt bằng căn hộ</title>
    <style>
        :root {
            --primary-color: #0ea5e9; /* Màu xanh neon công nghệ */
            --bg-color: #0f172a;      /* Nền tối sâu */
            --panel-bg: #1e293b;      /* Nền bảng điều khiển */
            --border-color: #475569;  /* Màu tường kỹ thuật */
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
        }

        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            overflow: hidden; 
        }

        /* Bảng điều khiển phía bên trái */
        #control-panel {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid #334155;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        
        .section-desc {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: -10px;
            margin-bottom: 5px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        
        label { font-size: 0.75rem; font-weight: 600; color: var(--text-sub); uppercase; letter-spacing: 0.5px;}
        
        input, select { 
            padding: 10px; 
            background: #0f172a;
            border: 1px solid #334155; 
            border-radius: 6px; 
            color: var(--text-main);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }
        
        input:disabled {
            background: #1e293b;
            color: #64748b;
            border-color: #334155;
        }

        button { 
            background: var(--primary-color); 
            color: #0f172a; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }
        
        button:hover { 
            background: #38bdf8; 
            transform: translateY(-1px);
        }
        
        button:active { transform: translateY(0); }
        
        .delete-btn { 
            background: #ef4444; 
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .delete-btn:hover { background: #f87171; }

        /* Khu vực hiển thị phòng */
        #canvas-outer {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            /* Lưới kiến trúc Blueprint */
            background-color: #0b0f19;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Layout căn hộ theo thiết kế */
        #apartment-layout {
            display: grid;
            grid-template-columns: 600px 250px; 
            grid-template-rows: 150px 150px 80px;    
            position: relative;
            background-color: #111827;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 8px; /* Giả lập độ dày của tường bao */
            background: #334155; /* Màu tường bao quanh */
        }

        .room {
            background-color: #1e293b;
            border: 2px solid #0f172a; /* Chỉ giới hạn giữa các phòng */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #main-room {
            grid-row: 1 / span 3; 
        }

        #toilet {
            /* Giữ nguyên cấu trúc phân chia */
        }

        #kitchen {
            /* Giữ nguyên cấu trúc phân chia */
        }

        /* Style chung cho các loại nhãn cửa */
        .door-label {
            position: absolute;
            padding: 2px 8px;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            z-index: 5;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* Vị trí Cửa vào chính */
        .entrance-label {
            bottom: -14px;
            left: 20px;
            background: #e11d48;
            color: white;
            box-shadow: 0 2px 6px rgba(225, 29, 72, 0.4);
        }

        /* Vị trí Cửa WC (Nằm ở bức tường ngăn với Phòng chính) */
        .toilet-door-label {
            left: -12px;
            top: 40px;
            background: #10b981; /* Màu xanh lá để phân biệt */
            color: #0f172a;
        }

        /* Vị trí Cửa Bếp (Nằm ở bức tường ngăn với Phòng chính) */
        .kitchen-door-label {
            left: -12px;
            top: 40px;
            background: #f59e0b; /* Màu vàng cam */
            color: #0f172a;
        }

        /* Khối nội thất */
        .furniture-block {
            position: absolute;
            background-color: rgba(14, 165, 233, 0.15);
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #e0f2fe;
            z-index: 100;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Khi rê chuột qua khối nội thất */
        .furniture-block:hover {
            background-color: rgba(14, 165, 233, 0.25);
            border-color: #38bdf8;
        }

        /* Khối nội thất khi được chọn click */
        .furniture-block.selected {
            border-color: #fbbf24;
            background-color: rgba(251, 191, 36, 0.2);
            color: #fef3c7;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: #fbbf24; }
            50% { border-color: #f59e0b; }
            100% { border-color: #fbbf24; }
        }

        /* Badge hiển thị kích thước kích thước nhỏ */
        .dim-badge {
            position: absolute;
            top: -24px;
            background: #fbbf24;
            color: #1e293b;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            border-radius: 4px;
            display: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .furniture-block.selected .dim-badge { display: block; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div>
            <h2>Thêm Nội Thất</h2>
            <div class="section-desc">Kích thước chuẩn (10px = 10cm)</div>
        </div>
        
        <div class="form-group">
            <label>Tên vật dụng</label>
            <input type="text" id="f-name" value="Sofa">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>Rộng (cm)</label>
                <input type="number" id="f-width" value="180">
            </div>
            <div class="form-group">
                <label>Sâu (cm)</label>
                <input type="number" id="f-height" value="80">
            </div>
        </div>

        <button id="add-btn">Thêm vào mặt bằng</button>

        <div style="margin-top: 10px;">
            <h2>Sửa nhanh khối</h2>
            <div class="section-desc">Click chọn một khối để đổi cỡ hoặc xóa</div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>Đổi Rộng</label>
                <input type="number" id="edit-w" placeholder="W" disabled>
            </div>
            <div class="form-group">
                <label>Đổi Sâu</label>
                <input type="number" id="edit-h" placeholder="H" disabled>
            </div>
        </div>
        <button id="delete-btn" class="delete-btn" style="display:none;">Xóa khỏi phòng</button>
    </div>

    <div id="canvas-outer">
        <div id="apartment-layout">
            
            <div id="main-room" class="room">Phòng chính</div>
            
            <div id="toilet" class="room">
                Nhà vệ sinh
                <div class="door-label toilet-door-label">Cửa vào</div>
            </div>
            
            <div id="kitchen" class="room">
                Bếp
                <div class="door-label kitchen-door-label">Cửa vào</div>
            </div>

            <div class="door-label entrance-label">Cửa chính</div>

        </div>
    </div>

    <script>
        // HOÀN TOÀN GIỮ NGUYÊN LOGIC CODE TRƯỚC ĐÓ ĐỂ ĐẢM BẢO HOẠT ĐỘNG KHÔNG ĐỔI
        const layout = document.getElementById('apartment-layout');
        const addBtn = document.getElementById('add-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const editW = document.getElementById('edit-w');
        const editH = document.getElementById('edit-h');

        let selectedBlock = null;

        addBtn.addEventListener('click', () => {
            const name = document.getElementById('f-name').value;
            const w = document.getElementById('f-width').value;
            const h = document.getElementById('f-height').value;
            createBlock(name, w, h);
        });

        function createBlock(name, w, h) {
            const block = document.createElement('div');
            block.className = 'furniture-block';
            block.style.width = w + 'px';
            block.style.height = h + 'px';
            block.style.left = '20px';
            block.style.top = '20px';
            
            block.innerHTML = `<span>${name}</span><div class="dim-badge">${w}x${h} cm</div>`;

            block.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                select(block);
                startDragging(e, block);
            });

            layout.appendChild(block);
            select(block);
        }

        function startDragging(e, block) {
            let startX = e.clientX;
            let startY = e.clientY;
            let initialLeft = block.offsetLeft;
            let initialTop = block.offsetTop;

            function doDrag(e) {
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                
                let newX = initialLeft + dx;
                let newY = initialTop + dy;

                const maxX = layout.offsetWidth - block.offsetWidth;
                const maxY = layout.offsetHeight - block.offsetHeight;

                block.style.left = Math.max(0, Math.min(newX, maxX)) + 'px';
                block.style.top = Math.max(0, Math.min(newY, maxY)) + 'px';
            }

            function stopDrag() {
                document.removeEventListener('mousemove', doDrag);
                document.removeEventListener('mouseup', stopDrag);
            }

            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function select(block) {
            if(selectedBlock) selectedBlock.classList.remove('selected');
            selectedBlock = block;
            selectedBlock.classList.add('selected');
            
            deleteBtn.style.display = 'block';
            editW.disabled = false;
            editH.disabled = false;
            editW.value = parseInt(block.style.width);
            editH.value = parseInt(block.style.height);
        }

        layout.addEventListener('mousedown', () => {
            if(selectedBlock) selectedBlock.classList.remove('selected');
            selectedBlock = null;
            deleteBtn.style.display = 'none';
            editW.disabled = true;
            editH.disabled = true;
        });

        editW.addEventListener('input', () => {
            if(selectedBlock) {
                selectedBlock.style.width = editW.value + 'px';
                selectedBlock.querySelector('.dim-badge').innerText = `${editW.value}x${editH.value} cm`;
            }
        });

        editH.addEventListener('input', () => {
            if(selectedBlock) {
                selectedBlock.style.height = editH.value + 'px';
                selectedBlock.querySelector('.dim-badge').innerText = `${editW.value}x${editH.value} cm`;
            }
        });

        deleteBtn.addEventListener('click', () => {
            if(selectedBlock) {
                selectedBlock.remove();
                selectedBlock = null;
                deleteBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
